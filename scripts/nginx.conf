# ─────────────────────────────────────────────────────────────────────────────
# SENTINEL v2 — Nginx Reverse Proxy Config
# Place at: /etc/nginx/sites-available/sentinel
# Enable: ln -s /etc/nginx/sites-available/sentinel /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

upstream sentinel_backend {
    server 127.0.0.1:4000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name your-vps-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-vps-domain.com;

    # SSL (use certbot: certbot --nginx -d your-vps-domain.com)
    ssl_certificate     /etc/letsencrypt/live/your-vps-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-vps-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── REST API ───────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://sentinel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket ──────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://sentinel_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # 1 hour for long-running sessions
        proxy_send_timeout 3600s;
    }

    # ── Reports (direct file serving) ─────────────────────────────────────────
    location /downloads/ {
        alias /opt/sentinel/reports/;
        autoindex off;
        auth_basic "Sentinel Reports";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # ── Frontend (serve built React app) ──────────────────────────────────────
    location / {
        root /opt/sentinel/frontend/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }
}

version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# TENTACLES v2 — Docker Compose
# Usage:
#   cp .env.example .env && nano .env   (add API keys)
#   docker compose up -d
#   docker compose logs -f tentacles
# ─────────────────────────────────────────────────────────────────────────────

services:
  tentacles:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tentacles-agent
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - WORKSPACE_DIR=/data/workspace
      - REPORTS_DIR=/data/reports
      - SCRIPTS_DIR=/data/scripts
      - RECON_OUTPUT_DIR=/data/recon_output
      - LOG_FILE=/data/logs/tentacles.log
    volumes:
      # Persistent data — survives container restarts
      - tentacles_workspace:/data/workspace
      - tentacles_reports:/data/reports
      - tentacles_logs:/data/logs
      - tentacles_recon:/data/recon_output
      # Mount your recon.sh into the scripts directory
      - ./your_recon.sh:/data/scripts/recon.sh:ro
      # SecLists wordlists (mount from host if available)
      - ${SECLISTS_PATH:-/opt/SecLists}:/opt/SecLists:ro
    networks:
      - tentacles_net
    # Required capabilities for nmap raw sockets
    cap_add:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Optional: Nginx reverse proxy with SSL termination
  nginx:
    image: nginx:alpine
    container_name: tentacles-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-./certs}:/etc/nginx/certs:ro
    depends_on:
      - tentacles
    networks:
      - tentacles_net
    profiles:
      - with-nginx   # only start if: docker compose --profile with-nginx up

volumes:
  tentacles_workspace:
    driver: local
  tentacles_reports:
    driver: local
  tentacles_logs:
    driver: local
  tentacles_recon:
    driver: local

networks:
  tentacles_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
